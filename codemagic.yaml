workflows:
  android-release:
    name: Android Release Build
    working_directory: form_app
    environment:
      flutter: stable
      java: 17
    scripts:
      - flutter pub get
      - rm -rf ~/.gradle/caches
      - flutter clean
      
      # یہ 3 لائن نئی - Gradle 7.6.3 force کریں گے
      - cd android
      - ./gradlew wrapper --gradle-version 7.6.3
      - cd ..
      
      - flutter build apk --debug --no-shrink
      - flutter build apk --release --no-shrink
    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
