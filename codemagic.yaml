workflows:
  android-release:
    name: Android Release Build
    working_directory: form_app
    environment:
      flutter: stable
      java: 17
    scripts:
      - flutter pub get
      - sed -i '' 's/gradle-.*-all.zip/gradle-7.6.3-all.zip/g' android/gradle/wrapper/gradle-wrapper.properties
      - sed -i '' 's/kotlinOptions {[^}]*}/kotlinOptions { jvmTarget = "1.8" languageVersion = "1.8" apiVersion = "1.8" }/g' android/app/build.gradle
      - cd android && ./gradlew clean
      - flutter build apk --release --no-pub
    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
