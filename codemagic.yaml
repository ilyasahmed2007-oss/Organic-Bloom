workflows:
  android-release:
    name: Android Release Build
    working_directory: form_app
    environment:
      flutter: stable
      java: 17
    scripts:
      - flutter pub get
      - sed -i '' 's/gradle-.*-all.zip/gradle-7.6.3-all.zip/g' android/gradle/wrapper/gradle-wrapper.properties
      - rm -rf ~/.gradle/caches
      - flutter clean
      - flutter build apk --debug --no-shrink  # یہ لائن gradlew بنا دے گی
      - cd android && ./gradlew assembleRelease --stacktrace --info --no-daemon
    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
