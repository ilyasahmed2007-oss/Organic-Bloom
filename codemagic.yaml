
workflows:
  android-release:
    name: Android Release Build
    working_directory: form_app
    environment:
      flutter: stable
      java: 17
      xcode: latest
    scripts:
      - flutter pub get
      - sed -i '' 's/gradle-.*-all.zip/gradle-7.6.3-all.zip/g' android/gradle/wrapper/gradle-wrapper.properties
      - sed -i '' 's/kotlin_version = .*/kotlin_version = "1.8.22"/g' android/build.gradle
      - rm -rf ~/.gradle/caches
      - flutter clean
      - cd android && chmod +x gradlew
      - cd android && ./gradlew assembleRelease --stacktrace --info --no-daemon
    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
