workflows:
  android-release:
    name: Android Release Build
    working_directory: form_app
    environment:
      flutter: stable
      java: 17
    scripts:
      - flutter pub get
      - cd android && ./gradlew wrapper --gradle-version 7.6.3
      - flutter build apk --release
    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
